<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Cricket Revolution Training Nets</title>

    <!-- Open Graph / link preview (iMessage, WhatsApp, social). Crawlers read the
         STATIC index.html (no JS), so these live here, not in a React route. The
         image is served same-origin at /og-image.jpg (1200x630). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Cricket Revolution" />
    <meta property="og:title" content="Cricket Revolution — Indoor Cricket Training Nets" />
    <meta property="og:description" content="Book a net in seconds — bowling machines & full run-up nets in Stirling WA. Online booking, secure payment, instant gate code." />
    <meta property="og:url" content="https://cricketrevolution.com.au/" />
    <meta property="og:image" content="https://cricketrevolution.com.au/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Cricket Revolution — indoor cricket training nets, Stirling WA" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Cricket Revolution — Indoor Cricket Training Nets" />
    <meta name="twitter:description" content="Book a net in seconds — Stirling WA." />
    <meta name="twitter:image" content="https://cricketrevolution.com.au/og-image.jpg" />

    <!-- PWA (SPEC_PWA_PUSH_NOTIFICATIONS). The manifest is generated by
         vite-plugin-pwa. iOS reads these meta/link tags (NOT the manifest) for the
         home-screen icon + standalone status bar. -->
    <meta name="theme-color" content="#dc2626" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Revolution" />

    <!-- 
      Cross-Origin Isolation: ALL set to permissive values.
      These MUST come BEFORE any script tags to take effect.
    -->
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="unsafe-none" />
    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups" />
    <meta http-equiv="Cross-Origin-Resource-Policy" content="cross-origin" />

    <!--
      Content Security Policy is now served as a RESPONSE HEADER from vercel.json
      (SEC Phase 4, 2026-06-03) — strict, Convex-only, no 'unsafe-inline'/'unsafe-eval'
      for scripts. The header is authoritative on prod (and can enforce
      frame-ancestors, which a meta tag cannot). No meta CSP here so local `bun dev`
      / Vite HMR is unconstrained; prod is covered by the header.
    -->

    <meta name="description" content="Book indoor cricket training nets at Cricket Revolution, Stirling WA — bowling machines and full run-up nets. Book online, pay securely, get your gate code instantly." />
    <!-- Shipper/Railway telemetry removed: 503'd on the Vercel/self-owned stack
         and polluted the console. Railway backend is decommissioned. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
