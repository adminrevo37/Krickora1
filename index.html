      Cross-Origin Isolation: ALL set to permissive values.
      These MUST come BEFORE any script tags to take effect.
    -->

    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin-allow-popups" />

    <!-- 
      Content Security Policy — Convex-only. Railway fully decommissioned.
    -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://*.convex.cloud https://*.convex.site;
      style-src 'self' 'unsafe-inline';
      img-src 'self' data: blob: https: http:;
      font-src 'self' data: https:;
      connect-src 'self' https://adventurous-chickadee-53.convex.cloud https://adventurous-chickadee-53.convex.site https://*.convex.cloud https://*.convex.site wss://adventurous-chickadee-53.convex.cloud wss://*.convex.cloud https://*.shipper.now https://*.w.modal.host https://accounts.google.com https://*.googleapis.com http://localhost:* ws://localhost:*;
      frame-src 'self' https://*.convex.site https://adventurous-chickadee-53.convex.site https://accounts.google.com;
      worker-src 'self' blob:;
    " />

    <meta name="description" content="" />
    <!-- Shipper/Railway telemetry removed: 503'd on the Vercel/self-owned stack
         and polluted the console. Railway backend is decommissioned. -->
